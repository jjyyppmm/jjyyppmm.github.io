<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的极客空间</title>
    <style>
        body { 
            background-color: #0a0a0a; 
            color: #00ff41; /* 经典的黑客绿 */
            font-family: 'Courier New', Courier, monospace; 
            display: flex; 
            flex-direction: column;
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
        }
        .container {
            border: 1px solid #00ff41;
            padding: 40px;
            box-shadow: 0 0 20px rgba(0, 255, 65, 0.2);
            border-radius: 5px;
            text-align: center;
        }
        .cursor {
            display: inline-block;
            width: 10px;
            height: 20px;
            background: #00ff41;
            animation: blink 1s infinite;
            vertical-align: middle;
        }
        @keyframes blink {
            0%, 49% { opacity: 1; }
            50%, 100% { opacity: 0; }
        }
        a { color: #00ff41; text-decoration: none; border-bottom: 1px dashed #00ff41; }
        a:hover { background: #00ff41; color: #000; }
    </style>
</head>
<body>
    <div class="container">
        <h1>SYSTEM READY.</h1>
        <p>> 欢迎来到我的数字领地</p>
        <p>> 联系邮箱: <a href="mailto:dabor@11271128.xyz">dabor@11271128.xyz</a></p>
        <p>> 状态: 正在折腾技术工具...<span class="cursor"></span></p>
    </div>
</body>
</html>
